<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AF Stroke Prevention — Shared Decision-Making Pathway</title>
  
  <!-- React and ReactDOM CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel for Live JSX Parsing in Browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Tailwind CSS for Modern Interface Styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- PDF Generation Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
    body {
      font-family: 'Inter', sans-serif;
    }
    @media print {
      body {
        background: white !important;
        color: black !important;
      }
      #root, .fixed, header, main, .print-hide {
        display: none !important;
      }
      #print-area-patient, #print-area-physician {
        display: block !important;
        position: absolute;
        left: 0;
        top: 0;
        width: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
        background: white !important;
        box-shadow: none !important;
        border: none !important;
      }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased pb-20">

  <div id="root"></div>

  <script type="text/babel">
    // Destructure React hooks to make sure calls like useState and useMemo are fully defined
    const { useState, useMemo } = React;

    // Helper for PDF Export
    const exportToPDF = (elementId, filename) => {
      const { jsPDF } = window.jspdf;
      const element = document.getElementById(elementId);
      
      html2canvas(element, { scale: 2 }).then(canvas => {
        const imgData = canvas.toDataURL('image/png');
        const pdf = new jsPDF('p', 'mm', 'a4');
        const imgWidth = 210;
        const imgHeight = (canvas.height * imgWidth) / canvas.width;
        pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
        pdf.save(`${filename}.pdf`);
      });
    };

    // Inline SVG Icon Helper Components for Zero-dependency, Fast Loading
    const HeartIcon = () => (
      <svg className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
        <path strokeLinecap="round" strokeLinejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
      </svg>
    );

    const ShieldIcon = ({ className = "h-5 w-5" }) => (
      <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
        <path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
      </svg>
    );

    const AlertIcon = ({ className = "h-5 w-5" }) => (
      <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
        <path strokeLinecap="round" strokeLinejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
      </svg>
    );

    const CheckIcon = ({ className = "h-4 w-4" }) => (
      <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="3">
        <path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" />
      </svg>
    );

    const DocIcon = ({ className = "h-5 w-5" }) => (
      <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
        <path strokeLinecap="round" strokeLinejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
      </svg>
    );

    const PrintIcon = () => (
      <svg className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
        <path strokeLinecap="round" strokeLinejoin="round" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
      </svg>
    );

    const RefreshIcon = () => (
      <svg className="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
        <path strokeLinecap="round" strokeLinejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H18.2" />
      </svg>
    );

    const UserIcon = ({ className = "h-5 w-5" }) => (
      <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
        <path strokeLinecap="round" strokeLinejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
      </svg>
    );

    const ArrowRightIcon = () => (
      <svg className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
        <path strokeLinecap="round" strokeLinejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" />
      </svg>
    );

    const ChevronDownIcon = () => (
      <svg className="h-4 w-4 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
        <path strokeLinecap="round" strokeLinejoin="round" d="M19 9l-7 7-7-7" />
      </svg>
    );

    const ChevronUpIcon = () => (
      <svg className="h-4 w-4 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
        <path strokeLinecap="round" strokeLinejoin="round" d="M5 15l7-7 7 7" />
      </svg>
    );

    const CloseIcon = () => (
      <svg className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
        <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    );

    // Clinical Parameters Matrix Configuration
    const CHA2DS2_VA_ITEMS = [
      { id: 'c', letter: 'C', label: 'Heart failure / LV dysfunction', sublabel: 'Moderate-to-severe LV dysfunction or clinical HF', points: 1 },
      { id: 'h', letter: 'H', label: 'Hypertension', sublabel: 'On medication or SBP > 140 mmHg', points: 1 },
      { id: 'a2', letter: 'A₂', label: 'Age ≥ 75 years', points: 2 },
      { id: 'd', letter: 'D', label: 'Diabetes mellitus', sublabel: 'Type 1 or Type 2 on treatment', points: 1 },
      { id: 's2', letter: 'S₂', label: 'Stroke / TIA / systemic embolism', sublabel: 'Prior history of thromboembolic event', points: 2 },
      { id: 'v', letter: 'V', label: 'Vascular disease', sublabel: 'Prior MI, peripheral artery disease, or aortic plaque', points: 1 },
      { id: 'a', letter: 'A', label: 'Age 65–74 years', points: 1 },
    ];

    const HAS_BLED_ITEMS = [
      { id: 'h', letter: 'H', label: 'Hypertension', sublabel: 'Uncontrolled SBP > 160 mmHg', points: 1 },
      { id: 'a1', letter: 'A', label: 'Abnormal renal function', sublabel: 'Dialysis, transplant, or Cr < 15 ml/min', points: 1 },
      { id: 'a2', letter: 'A', label: 'Abnormal liver function', sublabel: 'Cirrhosis or LFTs > 3x ULN', points: 1 },
      { id: 's', letter: 'S', label: 'Stroke history', sublabel: 'Previous ischemic or haemorrhagic stroke', points: 1 },
      { id: 'b', letter: 'B', label: 'Bleeding history', sublabel: 'Prior major bleed or predisposition', points: 1 },
      { id: 'l', letter: 'L', label: 'Labile INR', sublabel: 'Unstable INR, TTR < 60% on VKA', points: 1 },
      { id: 'e', letter: 'E', label: 'Elderly > 65', sublabel: 'Age over 65 years', points: 1 },
      { id: 'd1', letter: 'D', label: 'Drugs', sublabel: 'Antiplatelets or NSAIDs', points: 1 },
      { id: 'd2', letter: 'D', label: 'Alcohol excess', sublabel: '≥ 8 drinks per week', points: 1 },
    ];

    const SPECIAL_CONDITIONS = [
      { id: 'valve', label: 'Mechanical heart valve', alert: 'Warfarin only — NOAC contraindicated' },
      { id: 'ms', label: 'Moderate/severe rheumatic mitral stenosis', alert: 'Warfarin preferred' },
      { id: 'hcm', label: 'Hypertrophic cardiomyopathy (HCM)', alert: 'OAC regardless of score' },
      { id: 'amyloid', label: 'Cardiac amyloidosis', alert: 'OAC regardless of score' },
      { id: 'thrombus', label: 'LA / LAA thrombus', alert: 'Anticoagulation required' },
      { id: 'congenital', label: 'High-risk adult congenital heart disease', alert: 'Consider OAC' },
      { id: 'pregnancy', label: 'Pregnancy with elevated thromboembolic risk', alert: 'Special anticoagulation pathway' },
    ];

    const MODIFIABLE_BLEEDING_RISKS = [
      { label: 'Control BP to < 140/90 mmHg' },
      { label: 'Stop NSAIDs / unnecessary antiplatelets' },
      { label: 'Improve INR control (target TTR ≥ 70%)' },
      { label: 'Review drug interactions' },
      { label: 'Address renal / liver dysfunction' },
      { label: 'Improve adherence' },
    ];

    const PATIENT_PRIORITIES = [
      { id: 'no_blood_tests', text: 'I want no blood tests', sub: 'NOAC if eligible', color: 'bg-emerald-50 border-emerald-200 text-emerald-900 ring-emerald-500' },
      { id: 'monitoring', text: 'I prefer monitoring', sub: 'Warfarin may fit', color: 'bg-blue-50 border-blue-200 text-blue-900 ring-blue-500' },
      { id: 'major_bleeding', text: 'I had major bleeding', sub: 'Evaluate LAAO pathway', color: 'bg-purple-50 border-purple-200 text-purple-900 ring-purple-500' },
      { id: 'fear_stroke', text: 'I fear stroke most', sub: 'Discuss anticoagulation benefit', color: 'bg-rose-50 border-rose-200 text-rose-900 ring-rose-500' },
      { id: 'fear_bleeding', text: 'I fear bleeding most', sub: 'Modify risks + safest option', color: 'bg-orange-50 border-orange-200 text-orange-900 ring-orange-500' },
      { id: 'travel', text: 'I travel frequently', sub: 'NOAC — no INR monitoring', color: 'bg-cyan-50 border-cyan-200 text-cyan-900 ring-cyan-500' },
    ];

    // Main React Application Code
    function App() {
      const [activeTab, setActiveTab] = useState('stroke');

      // Clinical Identity Card - Empty by default
      const [patientName, setPatientName] = useState('');
      const [mrn, setMrn] = useState('');
      const [consultantName, setConsultantName] = useState('');
      const [age, setAge] = useState('');
      const [sex, setSex] = useState('');

      // Selected clinical variables state hooks
      const [selectedCha, setSelectedCha] = useState([]);
      const [selectedHas, setSelectedHas] = useState([]);
      const [selectedSpecials, setSelectedSpecials] = useState([]);
      const [selectedPriority, setSelectedPriority] = useState(null);

      // Anticoagulant selected configuration
      const [selectedTreatmentType, setSelectedTreatmentType] = useState('none');
      const [selectedNoacDrug, setSelectedNoacDrug] = useState('Apixaban');
      const [selectedRenalCheck, setSelectedRenalCheck] = useState('standard');

      // Dropdown Accordion States
      const [isSpecialsOpen, setIsSpecialsOpen] = useState(true);
      const [isModifiableOpen, setIsModifiableOpen] = useState(true);
      const [isRenalAccordionOpen, setIsRenalAccordionOpen] = useState(true);

      // Printable reports status
      const [showPatientSummary, setShowPatientSummary] = useState(false);
      const [showPhysicianReport, setShowPhysicianReport] = useState(false);

      const chaScore = useMemo(() => {
        let score = 0;
        CHA2DS2_VA_ITEMS.forEach(item => {
          if (selectedCha.includes(item.id)) {
            score += item.points;
          }
        });
        return score;
      }, [selectedCha]);

      const hasScore = useMemo(() => {
        let score = 0;
        HAS_BLED_ITEMS.forEach(item => {
          if (selectedHas.includes(item.id)) {
            score += item.points;
          }
        });
        return score;
      }, [selectedHas]);

      const recommendations = useMemo(() => {
        const hasSpecial = selectedSpecials.length > 0;
        
        if (hasSpecial) {
          if (selectedSpecials.includes('valve')) {
            return {
              strategy: 'Oral Anticoagulation (Warfarin)',
              badgeColor: 'bg-red-500 text-white',
              text: 'Mechanical heart valve detected. NOACs/DOACs are contraindicated. Therapeutic Warfarin (VKA) target INR 2.5 (2.0-3.0 range) is required.',
              type: 'warfarin'
            };
          }
          if (selectedSpecials.includes('ms')) {
            return {
              strategy: 'Oral Anticoagulation (Warfarin Preferred)',
              badgeColor: 'bg-amber-500 text-white',
              text: 'Moderate-to-severe Rheumatic Mitral Stenosis detected. Warfarin is the indicated therapeutic pathway.',
              type: 'warfarin'
            };
          }
          if (selectedSpecials.includes('thrombus')) {
            return {
              strategy: 'Systemic Anticoagulation Indicated',
              badgeColor: 'bg-indigo-500 text-white',
              text: 'Left Atrial / LAA Thrombus detected. Systemic oral anticoagulation is indicated.',
              type: 'noac'
            };
          }
          return {
            strategy: 'Oral Anticoagulation Recommended (Clinical Override)',
            badgeColor: 'bg-indigo-500 text-white',
            text: 'Patient exhibits high-risk override conditions. Anticoagulation is indicated regardless of standard calculated score.',
            type: 'noac'
          };
        }

        if (chaScore === 0) {
          return {
            strategy: 'No Routine Anticoagulation',
            badgeColor: 'bg-emerald-500 text-white',
            text: 'Low thromboembolic risk (CHA₂DS₂-VA = 0). Benefits do not outweigh bleeding risks. Reassess annually.',
            type: 'none'
          };
        } else if (chaScore === 1) {
          return {
            strategy: 'Oral Anticoagulation Should Be Considered (Class IIa)',
            badgeColor: 'bg-blue-500 text-white',
            text: 'Intermediate thromboembolic risk (CHA₂DS₂-VA = 1). Prioritize clinical risk profile and patient preference values.',
            type: 'noac'
          };
        } else {
          return {
            strategy: 'Oral Anticoagulation Strongly Indicated (Class I)',
            badgeColor: 'bg-red-500 text-white',
            text: 'Elevated stroke risk (CHA₂DS₂-VA ≥ 2). Systemic oral anticoagulation (DOAC preferred) is recommended to optimize protection.',
            type: 'noac'
          };
        }
      }, [chaScore, selectedSpecials]);

      // Dynamic Medical Clinical Rationale Generator
      const computedClinicalRationale = useMemo(() => {
        if (selectedTreatmentType === 'none') {
          return `Low-risk stroke profile (CHA₂DS₂-VA = ${chaScore}) with no override indicators. Systemic oral anticoagulation is not indicated. Routine annual review scheduled.`;
        }
        
        let base = '';
        if (selectedSpecials.length > 0) {
          const conditionNames = selectedSpecials.map(s => SPECIAL_CONDITIONS.find(sc => sc.id === s)?.label).join(', ');
          base = `Oral anticoagulation indicated due to high-risk override criteria (${conditionNames}), bypassing standard numerical thresholds. `;
        } else {
          base = `Oral anticoagulation therapy indicated due to elevated thromboembolic stroke risk with a sex-neutral CHA₂DS₂-VA score of ${chaScore}. `;
        }

        const bleedRiskText = hasScore >= 3 
          ? `High bleeding risk identified (HAS-BLED = ${hasScore}). Standard strategy is to target and treat modifiable bleeding parameters rather than withholding stroke protection.`
          : `Acceptable bleeding risk profile (HAS-BLED = ${hasScore}).`;

        let choiceDetail = '';
        if (selectedTreatmentType === 'noac') {
          let renalLabel = 'Standard Dose';
          if (selectedRenalCheck === 'adjust') renalLabel = 'Dose adjusted based on CrCl 15-49';
          if (selectedRenalCheck === 'contraindicated') renalLabel = 'Contraindicated / Specialist VKA management recommended';
          
          choiceDetail = ` Prescribed ${selectedNoacDrug} guided by active Renal Check status: ${renalLabel}. This selection addresses the patient's key preference of avoiding regular blood checks and aligns with clinical guidelines.`;
        } else if (selectedTreatmentType === 'warfarin') {
          choiceDetail = ` Prescribed Vitamin K Antagonist (Warfarin) due to specific absolute clinical indications. Planned frequent INR monitoring to maintain therapeutic target of 2.0-3.0.`;
        } else if (selectedTreatmentType === 'laao') {
          choiceDetail = ` Referred for Left Atrial Appendage Occlusion (LAAO) evaluation due to persistent bleeding challenges on anticoagulation therapy or severe absolute constraints.`;
        }

        return `${base}${bleedRiskText}${choiceDetail}`;
      }, [selectedTreatmentType, selectedNoacDrug, selectedRenalCheck, selectedSpecials, chaScore, hasScore]);

      const toggleCha = (id) => {
        setSelectedCha(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
      };
      const toggleHas = (id) => {
        setSelectedHas(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
      };
      const toggleSpecial = (id) => {
        setSelectedSpecials(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
      };
      const handlePrioritySelect = (id) => {
        setSelectedPriority(prev => prev === id ? null : id);
      };

      const resetAll = () => {
        setSelectedCha([]);
        setSelectedHas([]);
        setSelectedSpecials([]);
        setSelectedPriority(null);
        setSelectedTreatmentType('none');
        setSelectedRenalCheck('standard');
        setPatientName('');
        setMrn('');
        setAge('');
        setSex('');
        setConsultantName('');
        setActiveTab('stroke');
      };

      return (
        <div className="min-h-screen bg-slate-50 text-slate-900 font-sans antialiased pb-20 print:pb-0">
          
          {/* Header Branding Section */}
          <header className="bg-white border-b border-slate-200 sticky top-0 z-30 shadow-sm print:hidden">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
              <div className="flex items-center gap-3">
                <div className="bg-blue-600 text-white p-2.5 rounded-xl shadow-md">
                  <HeartIcon />
                </div>
                <div>
                  <div className="flex items-center gap-2 flex-wrap">
                    <span className="text-xs font-bold uppercase tracking-wider text-blue-600">As-Salam International Hospital</span>
                    <span className="text-xs text-slate-400 font-semibold">• Cardiology Department</span>
                  </div>
                  <h1 className="text-xl font-bold text-slate-900 tracking-tight flex items-center gap-2">
                    AF Stroke Prevention — Shared Decision-Making Pathway
                  </h1>
                  <p className="text-xs text-slate-500 mt-0.5 font-medium">ESC 2024 Guideline-Based Clinical Decision Support</p>
                </div>
              </div>
              
              <div className="flex items-center gap-2 shrink-0">
                <span className="bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1.5 rounded-lg border border-blue-200">
                  ESC AF 2024
                </span>
                <button 
                  onClick={resetAll}
                  className="bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-bold px-3 py-1.5 rounded-lg border border-slate-200 transition flex items-center gap-1"
                >
                  <RefreshIcon /> New Patient
                </button>
              </div>
            </div>
          </header>

          {/* Navigation Tab Panel */}
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-6 print:hidden">
            <div className="bg-white border border-slate-200 rounded-2xl p-1.5 shadow-sm flex flex-wrap md:flex-nowrap gap-1">
              {['stroke', 'bleeding', 'strategy', 'documentation'].map((tab, idx) => {
                const labels = ['Stroke Risk', 'Bleeding Safety', 'Treatment Strategy', 'Documentation Summary'];
                const isActive = activeTab === tab;
                return (
                  <button 
                    key={tab}
                    onClick={() => setActiveTab(tab)}
                    className={`flex-1 py-2 px-4 rounded-xl font-semibold text-xs md:text-sm transition flex items-center justify-center gap-2 ${
                      isActive ? 'bg-blue-600 text-white shadow-sm' : 'text-slate-600 hover:bg-slate-50'
                    }`}
                  >
                    <span className={`h-5 w-5 rounded-full flex items-center justify-center text-[10px] font-bold ${isActive ? 'bg-white text-blue-600' : 'bg-slate-100 text-slate-600'}`}>{idx + 1}</span>
                    {labels[idx]}
                  </button>
                );
              })}
            </div>
          </div>

          <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-6 print:hidden">

            {/* Step 1: Patient Information Card */}
            <div className="bg-white border border-slate-200 rounded-3xl p-6 shadow-sm mb-6 print:hidden">
              <div className="flex items-center gap-2 border-b border-slate-100 pb-3 mb-4">
                <UserIcon />
                <h2 className="text-sm font-bold text-slate-800 uppercase tracking-wider">1. Clinical Identification & Patient Profile</h2>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-5 gap-4">
                <div className="md:col-span-2">
                  <label className="block text-[11px] font-bold uppercase text-slate-500 tracking-wider">Patient Name</label>
                  <input 
                    type="text" 
                    value={patientName} 
                    onChange={e => setPatientName(e.target.value)}
                    placeholder="Enter patient full name"
                    className="w-full mt-1 bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-xs text-slate-800 focus:outline-none focus:ring-1 focus:ring-blue-500 font-semibold"
                  />
                </div>
                <div>
                  <label className="block text-[11px] font-bold uppercase text-slate-500 tracking-wider">MRN / ID Number</label>
                  <input 
                    type="text" 
                    value={mrn} 
                    onChange={e => setMrn(e.target.value)}
                    placeholder="Enter MRN code"
                    className="w-full mt-1 bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-xs text-slate-800 focus:outline-none focus:ring-1 focus:ring-blue-500 font-mono"
                  />
                </div>
                <div>
                  <label className="block text-[11px] font-bold uppercase text-slate-500 tracking-wider">Age</label>
                  <input 
                    type="text" 
                    value={age} 
                    onChange={e => setAge(e.target.value)}
                    placeholder="e.g., 68"
                    className="w-full mt-1 bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-xs text-slate-800 focus:outline-none focus:ring-1 focus:ring-blue-500"
                  />
                </div>
                <div>
                  <label className="block text-[11px] font-bold uppercase text-slate-500 tracking-wider">Sex</label>
                  <select 
                    value={sex} 
                    onChange={e => setSex(e.target.value)}
                    className="w-full mt-1 bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-xs text-slate-800 focus:outline-none focus:ring-1 focus:ring-blue-500 font-semibold"
                  >
                    <option value="">Select Sex</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                  </select>
                </div>
              </div>
              
              <div className="mt-4 pt-4 border-t border-slate-100">
                <div className="max-w-md">
                  <label className="block text-[11px] font-bold uppercase text-slate-500 tracking-wider">Consulting Specialist Name</label>
                  <input 
                    type="text" 
                    value={consultantName} 
                    onChange={e => setConsultantName(e.target.value)}
                    placeholder="Enter physician/specialist name"
                    className="w-full mt-1 bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-xs text-slate-800 focus:outline-none focus:ring-1 focus:ring-blue-500 font-semibold"
                  />
                </div>
              </div>
            </div>

                    <div className="space-y-2">
                      <div>
                        <span className="block text-[9px] font-bold text-slate-400 uppercase">Physician Clinical Rationale:</span>
                        <p className="text-slate-700 font-bold leading-relaxed mt-0.5 italic">
                          {computedClinicalRationale}
                        </p>
                      </div>

                      {selectedPriority && (
                        <div className="pt-2 border-t border-slate-100 flex items-center gap-2">
                          <span className="text-[9px] font-bold text-slate-400 uppercase shrink-0">Patient Care Preference:</span>
                          <span className="bg-slate-100 px-2 py-0.5 rounded text-[10px] font-bold text-slate-800">
                            "{PATIENT_PRIORITIES.find(p => p.id === selectedPriority)?.text}"
                          </span>
                        </div>
                      )}
                    </div>
                  </div>

                  <div className="border-t border-slate-400 pt-5 flex justify-between items-end">
                    <div className="text-[9px] text-slate-400 font-semibold">
                      <p>Document compiled via: Outpatient Cardiovascular Decision Support Engine</p>
                      <p>Software Standard: ESC-AF-2024-v1.9</p>
                    </div>
                    <div className="text-right text-xs">
                      <div className="h-8 border-b border-slate-400 w-48 mb-1"></div>
                      <p className="font-black text-slate-900">{consultantName || 'Treating Specialist Signature'}</p>
                      <p className="text-slate-500 text-[10px] font-semibold">MD, Cardiologist Outpatient Unit</p>
                    </div>
                  </div>

                </div>

              </div>
            </div>
          )}

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
